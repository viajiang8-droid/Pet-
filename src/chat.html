<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'none'; img-src 'self'; style-src 'self'; script-src 'self'" />
    <title>点点</title>
    <link rel="stylesheet" href="chat.css" />
  </head>
  <body>
    <header class="chat-header">
      <img class="header-avatar" src="../assets/pets/diandian/frames/moren/01.png" alt="" />
      <div class="header-title">
        <div class="header-name">点点</div>
        <div class="header-status">在线</div>
      </div>
    </header>

    <div id="banner" class="banner hidden">
      <span>还没配置 API Key，无法和我聊天</span>
      <button id="banner-settings" class="banner-btn" type="button">去设置</button>
    </div>

    <main id="messages" class="messages"></main>

    <form id="composer" class="composer">
      <input id="input" class="input" type="text" placeholder="发消息…" autocomplete="off" />
      <button id="send" class="send" type="submit" aria-label="发送">↑</button>
    </form>

    <script src="chat.js"></script>
  </body>
</html>
